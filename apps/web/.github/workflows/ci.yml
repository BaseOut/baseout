name: ci

on:
  pull_request:
    branches: [main, staging, 'autumn/baseout-initial-refactor']
  push:
    branches: [main, staging, 'autumn/baseout-initial-refactor']
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      # astro check loads @astrojs/cloudflare → @cloudflare/vite-plugin, which
      # auto-discovers wrangler.jsonc to pick up the pinned compatibility_date.
      # wrangler.jsonc is gitignored (rendered by scripts/launch.mjs at dev/
      # build), so without this step the plugin defaults to today's date and
      # miniflare fails when today exceeds the bundled workerd's max compat
      # date. Mirrors launch.mjs's non-dev placeholder substitution.
      - name: Render wrangler.jsonc for astro check
        run: |
          cp wrangler.jsonc.example wrangler.jsonc
          sed -i 's|{{DATABASE_URL}}|postgres://placeholder:placeholder@localhost:5432/placeholder|g' wrangler.jsonc
      # worker-configuration.d.ts is gitignored; src/env.d.ts's
      # `ProvidedEnv extends Env` and global types like `SendEmail`
      # depend on it. Generated by `wrangler types` from wrangler.jsonc.
      - name: Generate Cloudflare worker types
        run: npm run cf-typegen
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baseout_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/baseout_test
          DRIZZLE_SSL: 'false'
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - name: Build (Astro + wrangler render)
        run: npm run build

  deploy-dev:
    needs: [lint, typecheck, unit, integration, build]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/autumn/baseout-initial-refactor' ||
       github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - name: Deploy to baseout-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Pinned account ID skips wrangler's `GET /memberships` lookup so
          # the API token doesn't need User->User Details->Read.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

  deploy-staging:
    needs: [lint, typecheck, unit, integration, build]
    if: false  # gated until staging Hyperdrive + DB provisioned (DO auth pending). See pipeline-roadmap.md "Awaiting DO authorization".
    # if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - name: Migrate staging Postgres
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: node scripts/migrate.mjs
      - name: Deploy to baseout-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:staging
      - name: Smoke /api/me (expect 401)
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" https://baseout-staging.openside.workers.dev/api/me)
          if [ "$status" != "401" ]; then
            echo "Expected 401 from /api/me, got $status" >&2
            exit 1
          fi

  upload-prod-version:
    needs: [lint, typecheck, unit, integration, build]
    if: false  # gated until prod Hyperdrive + DB provisioned (DO auth pending). See pipeline-roadmap.md "Awaiting DO authorization".
    # if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: upload-prod-version
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FONTAWESOME_TOKEN: ${{ secrets.FONTAWESOME_TOKEN }}
        run: npm ci
      - name: Upload candidate version to baseout (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run versions:upload:production -- --message "ci tag ${{ github.ref_name }}"
