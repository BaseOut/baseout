name = "baseout-website"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[[routes]]
pattern = "baseout.com/*"
zone_name = "baseout.com"

[[routes]]
pattern = "www.baseout.com/*"
zone_name = "baseout.com"

[env.production]
name = "baseout-website-production"

[env.staging]
name = "baseout-website-staging"

# Security headers
[env.production.vars]
ENVIRONMENT = "production"

[env.staging.vars]
ENVIRONMENT = "staging"

# Configure custom domains and SSL
[env.production.route]
pattern = "baseout.com/*"
zone_name = "baseout.com"

[env.staging.route]
pattern = "staging.baseout.com/*"
zone_name = "baseout.com" 